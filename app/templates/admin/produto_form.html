{% extends "base.html" %}
{% block content %}
<div class="container mt-4 mb-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/produtos">Produtos</a></li>
            <li class="breadcrumb-item active">Novo Produto</li>
        </ol>
    </nav>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Cadastrar Novo Produto</h4>
        </div>
        <div class="card-body">
            <form action="/admin/produtos/novo" method="post" enctype="multipart/form-data">
                <div class="row">
                    <!-- Coluna Principal -->
                    <div class="col-md-8">
                        <div class="mb-3">
                            <label for="nome_produto" class="form-label">Nome do Produto *</label>
                            <input type="text" class="form-control" id="nome_produto" name="nome_produto" required>
                        </div>
                        <div class="mb-3">
                            <label for="descricao" class="form-label">Descrição *</label>
                            <textarea class="form-control" id="descricao" name="descricao" rows="5" required></textarea>
                        </div>
                    </div>

                    <!-- Coluna Lateral (Configurações) -->
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="id_categoria" class="form-label">Categoria *</label>
                            <select class="form-select" id="id_categoria" name="id_categoria" required>
                                <option value="" selected disabled>Selecione...</option>
                                {% for cat in categorias %}
                                <option value="{{ cat.id_categoria }}">{{ cat.nome_categoria }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="material" class="form-label">Material *</label>
                            <input type="text" class="form-control" id="material" name="material" placeholder="Ex: Resina, PLA" required>
                        </div>
                        <div class="mb-3">
                            <label for="valor" class="form-label">Preço de Venda (R$) *</label>
                            <input type="number" step="0.01" class="form-control" id="valor" name="valor" required>
                        </div>
                        <div class="mb-3">
                            <label for="quantidade" class="form-label">Estoque Inicial *</label>
                            <input type="number" class="form-control" id="quantidade" name="quantidade" value="1" required>
                        </div>
                    </div>
                </div>

                <hr>

                <div class="row">
                    <h5 class="mb-3">Dimensões e Peso</h5>
                    <div class="col-md-3">
                        <label for="altura" class="form-label">Altura (cm)</label>
                        <input type="number" step="0.1" class="form-control" id="altura" name="altura" required>
                    </div>
                    <div class="col-md-3">
                        <label for="largura" class="form-label">Largura (cm)</label>
                        <input type="number" step="0.1" class="form-control" id="largura" name="largura" required>
                    </div>
                    <div class="col-md-3">
                        <label for="comprimento" class="form-label">Comprimento (cm)</label>
                        <input type="number" step="0.1" class="form-control" id="comprimento" name="comprimento" required>
                    </div>
                    <div class="col-md-3">
                        <label for="peso" class="form-label">Peso (kg)</label>
                        <input type="number" step="0.001" class="form-control" id="peso" name="peso" required>
                    </div>
                </div>

                <hr>

                <div class="row mb-4">
                    <div class="col-md-12">
                        <label for="imagem_arquivo" class="form-label">Imagem do Produto</label>
                        <input type="file" class="form-control" id="imagem_arquivo" name="imagem_arquivo" accept="image/*">
                        <div class="form-text">Formatos aceitos: JPG, PNG. Recomenda-se imagens quadradas.</div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="/admin/produtos" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary px-4">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
